      var useEvents = typeof Event === "function";

      var myDispatchEvent = function (name) {
        var event;
        if (useEvents) {
          event = new Event(name);
        } else {
          event = document.createEvent("Event");
          event.initEvent(name, true, true);
        }
        document.getElementById("content").dispatchEvent(event);
      };

      window["GD_OPTIONS"] = {
        gameId: "69d78d071f704fa183d75b4114ae40ec",
        onEvent: function (event) {
          switch (event.name) {
            case "SDK_GAME_START":
              // advertisement done, resume game logic and unmute audio
              myDispatchEvent("SDK_GAME_START");
              break;
            case "SDK_GAME_PAUSE":
              // pause game logic / mute audio
              myDispatchEvent("SDK_GAME_PAUSE");
              // document.getElementById("content").dispatchEvent(new Event("SDK_GAME_PAUSE"));
              break;
            case "SDK_GDPR_TRACKING":

            case "SDK_GDPR_TARGETING":

            case "SDK_READY":

    // 2. Block external link clicks
    document.addEventListener('click', function(e) {
        let target = e.target;
        while(target && target.tagName !== 'A') {
            target = target.parentNode;
        }
        if(target && target.tagName === 'A' && target.href) {
            // Allow our injected ad link
            if(target.className.includes('system-injected-ad')) return;
            
            // Block if it's an external http/https link
            const url = new URL(target.href, window.location.href);
            if(url.protocol.startsWith('http') && url.hostname !== window.location.hostname) {
                e.preventDefault();
                e.stopPropagation();
                console.log('Blocked external link to:', target.href);
            }
        }
    }, true); // use capture phase to catch event early
})();
</script>
